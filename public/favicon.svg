<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Taura OS">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#1e3d7a"/>
      <stop offset="100%" stop-color="#08132a"/>
    </radialGradient>
    <linearGradient id="outerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a68c8"/>
      <stop offset="100%" stop-color="#1e4499"/>
    </linearGradient>
    <linearGradient id="innerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44aaff"/>
      <stop offset="50%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#2277ee"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#2299ff"/>
    </linearGradient>
    <filter id="tGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="triGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="22"/>
  <polygon points="100,176 12,26 188,26" fill="none" stroke="url(#outerStroke)" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="100,152 34,46 166,46" fill="none" stroke="url(#innerStroke)" stroke-width="5" stroke-linejoin="round" filter="url(#triGlow)" opacity="0.92"/>
  <g filter="url(#tGlow)">
    <rect x="66" y="66" width="68" height="16" rx="3" fill="url(#tGrad)"/>
    <rect x="90" y="82" width="20" height="56" rx="3" fill="url(#tGrad)"/>
  </g>
</svg>
